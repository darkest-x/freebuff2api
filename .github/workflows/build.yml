name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: arm
            platform: linux/arm/v7
            suffix: armv7l
          - arch: arm64
            platform: linux/arm64
            suffix: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Build ${{ matrix.suffix }} binary
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            python:3.13-slim \
            bash -c "
              apt-get update && apt-get install -y binutils &&
              pip install uv pyinstaller &&
              uv sync --frozen --no-dev &&
              pyinstaller --onefile \
                --name freebuff2api-${{ matrix.suffix }} \
                --add-data 'freebuff2api:freebuff2api' \
                main.py
            "

      - uses: actions/upload-artifact@v4
        with:
          name: freebuff2api-${{ matrix.suffix }}
          path: dist/freebuff2api-${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            freebuff2api-armv7l/freebuff2api-armv7l
            freebuff2api-arm64/freebuff2api-arm64
