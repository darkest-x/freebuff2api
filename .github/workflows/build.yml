name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install uv
          uv sync --frozen --no-dev
          pip install pyinstaller

      - name: Build binary
        run: pyinstaller --onefile --name freebuff2api-amd64 --add-data "freebuff2api:freebuff2api" main.py

      - uses: actions/upload-artifact@v4
        with:
          name: freebuff2api-amd64
          path: dist/freebuff2api-amd64

  build-armv7l:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build armv7l via Docker QEMU
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            python:3.13-slim \
            bash -c "
              pip install uv pyinstaller &&
              uv sync --frozen --no-dev &&
              pyinstaller --onefile --name freebuff2api-armv7l --add-data 'freebuff2api:freebuff2api' main.py
            "

      - uses: actions/upload-artifact@v4
        with:
          name: freebuff2api-armv7l
          path: dist/freebuff2api-armv7l

  release:
    needs: [build-amd64, build-armv7l]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            freebuff2api-amd64/freebuff2api-amd64
            freebuff2api-armv7l/freebuff2api-armv7l
